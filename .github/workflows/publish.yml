name: Release & Publish

on:
  push:
    branches: [main]
    paths:
      - 'bin/**'
      - 'package.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # `npm i -g npm@latest` unlinks its own node_modules mid-install and then
      # crashes on `Cannot find module 'promise-retry'` (npm/cli#8172). Install
      # the new npm into an isolated prefix so the running npm isn't touched,
      # then prepend it to PATH — release-it picks it up automatically.
      - name: Upgrade npm for OIDC support
        run: |
          npm install --no-audit --no-fund --prefix "$RUNNER_TEMP/npm-upgrade" -g npm@latest
          echo "$RUNNER_TEMP/npm-upgrade/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/npm-upgrade/bin/npm" --version

      - name: Install release-it
        run: npm install -g release-it @release-it/conventional-changelog

      - name: Release
        run: release-it --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
